[general]
description = Dauki Fault PSHA - Point Source Model (Morino et al. 2014)
calculation_mode = classical
countries = BGD
random_seed = 42

[sites]
# Dhaka, Tongi, Narayanganj, Mymensingh, Sylhet, Jaflong
sites = 90.41 23.81, 90.50 23.90, 90.50 23.62, 90.41 24.75, 91.87 24.90, 92.12 25.10

[logic_tree]
source_model_logic_tree_file = source_model_logic_tree.xml
gsim_logic_tree_file = gmpe_logic_tree.xml
number_of_logic_tree_samples = 0

[source_model]
rupture_mesh_spacing = 5.0
width_of_mfd_bin = 0.1
area_source_discretization = 10.0

[site_params]
reference_vs30_type = inferred
reference_vs30_value = 250.0
reference_depth_to_1pt0km_per_sec = 0.3
reference_depth_to_2pt5km_per_sec = 1.5

[calculation]
investigation_time = 50.0
truncation_level = 3.0
maximum_distance = 300.0

intensity_measure_types_and_levels = {"PGA": logscale(0.01, 2.0, 30), "SA(0.2)": logscale(0.01, 2.0, 30), "SA(1.0)": logscale(0.01, 2.0, 30)}

[output]
export_dir = ./exports
mean_hazard_curves = true
quantile_hazard_curves = 0.05 0.16 0.5 0.84 0.95
hazard_maps = true
poes = 0.02 0.05 0.1 0.2 0.5
uniform_hazard_spectra = true
